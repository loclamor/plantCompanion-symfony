liip_imagine:
    driver: gd
    # Mode "lazy" : enregistre imagine_filter via un runtime Twig (évite la
    # FilterExtension dépréciée, dont getFunctions() est vide en 2.17).
    twig:
        mode: lazy
    # Les originaux sont résolus sous public/ (public/uploads -> ../uploads).
    # On ajoute le vrai dossier uploads comme data_root : sans lui, la validation
    # realpath de Liip rejette les fichiers atteints via le symlink (realpath hors
    # de public/). Les deux racines permettent de localiser ET valider.
    loaders:
        default:
            filesystem:
                data_root:
                    - '%kernel.project_dir%/public'
                    - '%kernel.project_dir%/uploads'
    filter_sets:
        # Vignette pour les listes / galeries
        plant_thumb:
            filters:
                thumbnail: { size: [250, 250], mode: inset }
        # Image moyenne pour la fiche / le carousel
        plant_large:
            filters:
                thumbnail: { size: [900, 900], mode: inset }
