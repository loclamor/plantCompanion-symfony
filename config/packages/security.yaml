security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: name
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            # Auth gérée par le SPA : connexion via POST /api/login (Security::login),
            # déconnexion via POST /api/logout (Security::logout). Pas de form_login.
            entry_point: App\Security\AppEntryPoint
            logout:
                # Le SPA déclenche la déconnexion par /api/logout ; ce chemin reste
                # une URL de logout serveur de secours.
                path: /logout
                target: /login

    # Note: seul le *premier* access_control correspondant s'applique.
    access_control:
        # API : login public, le reste exige l'authentification (entry point → 401 JSON)
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        # Inscription (page Twig) publique
        - { path: ^/register, roles: PUBLIC_ACCESS }
        # Tout le reste = coquille du SPA : publique (le SPA garde ses routes côté
        # client, l'API reste le vrai garde-fou)
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
