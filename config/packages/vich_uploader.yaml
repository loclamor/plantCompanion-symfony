vich_uploader:
    db_driver: orm
    metadata:
        type: attribute
    mappings:
        photo:
            # Les fichiers vivent à la racine ./uploads (partagé avec le legacy)
            # et sont exposés via le symlink public/uploads -> ../uploads.
            uri_prefix: /uploads
            upload_destination: '%kernel.project_dir%/uploads'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_remove: true
            inject_on_load: false
