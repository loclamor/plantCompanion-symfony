vich_uploader:
    db_driver: orm
    metadata:
        type: attribute
    mappings:
        photo:
            # Les fichiers vivent dans public/uploads (vrai dossier, servi directement
            # sous /uploads). Plus de symlink ni de partage ./uploads avec le legacy.
            uri_prefix: /uploads
            upload_destination: '%kernel.project_dir%/public/uploads'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            delete_on_remove: true
            inject_on_load: false
